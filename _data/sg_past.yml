- key: "2025r07"
  label: "令和7年度"
  short_label: "2025年度"
  title: "令和7年度 情報セキュリティマネジメント試験 公開問題"
  permalink: "/sg/past/2025r07/"
  official_page: "https://www.ipa.go.jp/shiken/mondai-kaiotu/sg_fe/koukai/2025r07.html"
  question_pdf: "https://www.ipa.go.jp/shiken/mondai-kaiotu/sg_fe/koukai/tbl5kb0000005r9r-att/2025r07_sg_qs.pdf"
  answer_pdf: "https://www.ipa.go.jp/shiken/mondai-kaiotu/sg_fe/koukai/tbl5kb0000005r9r-att/2025r07_sg_ans.pdf"
  source_note: "令和7年度 情報セキュリティマネジメント試験 科目A・B 公開問題"
  questions:
    - number: 1
      topic: "リスクマネジメントプロセス"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "エ"
      explanation: "リスク分析は，リスクの性質・特徴・必要に応じたリスクレベルを理解する工程です。リスク特定，リスク分析，リスク評価，リスク対応の役割を入れ替えないことがポイントです。"
      point: "リスク分析は「性質や大きさを理解する」，リスク評価は「基準と比べて判断する」。"
      related:
        - title: "リスクアセスメント"
          url: "/sg/risk-assessment/"
    - number: 2
      topic: "SIEM"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "ア"
      explanation: "SIEMは複数機器のログを集約し，相関分析や可視化によって異常の兆候を見つけやすくする仕組みです。パケット改ざん検査やUTM，バックアップ復旧とは役割が異なります。"
      point: "SIEMは「ログ集中管理」と「横断的な相関分析」。"
      related:
        - title: "ログ管理"
          url: "/sg/log-management/"
    - number: 3
      topic: "ゼロトラスト"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "イ"
      explanation: "ゼロトラストは，社内ネットワークであっても無条件に信頼せず，利用者・端末・アクセス先を継続的に確認する考え方です。ゼロデイやゼロ知識証明とは別の用語です。"
      point: "ゼロトラストは「内部も安全とは限らない」が出発点。"
      related:
        - title: "ゼロトラスト"
          url: "/sg/zero-trust/"
    - number: 4
      topic: "不正のトライアングル"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "ア"
      explanation: "不正のトライアングルは，動機・機会・正当化の三つで説明します。機会は，不正を実行しやすい環境や統制の弱さを指します。"
      point: "機会は「できてしまう環境」，動機は「追い込まれる理由」，正当化は「自分への言い訳」。"
    - number: 5
      topic: "DNSキャッシュポイズニング対策"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "イ"
      explanation: "外部からの再帰的問合せを制限すると，キャッシュサーバを第三者に悪用されにくくなります。待受けポートやトランザクションIDを固定すると，むしろ推測されやすくなります。"
      point: "キャッシュDNSは，不特定多数の再帰問合せを受け付けない。"
      related:
        - title: "DNS"
          url: "/sg/dns/"
    - number: 6
      topic: "CVSS v3"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "ア"
      explanation: "CVSSの現状評価基準は，攻撃コードの出現状況や対策の有無など，時間の経過で変わる要素を扱います。利用環境ごとの差は環境評価基準の領域です。"
      point: "現状評価は「今どう変わっているか」，環境評価は「自組織ではどうか」。"
    - number: 7
      topic: "特定電子メール法"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "エ"
      explanation: "特定電子メール法は，広告宣伝メールの送信者や送信委託者に対する義務を定めています。受託事業者だけを対象にする法律ではありません。"
      point: "広告宣伝メールでは，送信者・委託者の義務とオプトイン規制を押さえる。"
    - number: 8
      topic: "懲戒手続と監査"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "ア"
      explanation: "違反の可能性を認識しただけで直ちに懲戒手続を開始するのは，事実確認や公平性の観点で問題になります。段階的対応，公平な取扱い，周知は望ましい統制です。"
      point: "監査では，統制が強すぎて公平性や妥当性を欠くケースも指摘対象になる。"
    - number: 9
      topic: "サービス満足度の目標達成率"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "エ"
      explanation: "平均点は `(5×50 + 4×250 + 3×150 + 2×50 + 1×0) ÷ 500 = 3.6` です。目標値4.0で割るので，目標達成率は `3.6 ÷ 4.0 = 0.9` です。"
      point: "平均点を出してから，問題文の式どおりに目標値で割る。"
    - number: 10
      topic: "RASIS"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "ア"
      explanation: "RASISのRは信頼性で，平均故障間隔であるMTBFなどで表します。可用性は稼働率，保守性はMTTRなどが関係します。"
      point: "R=Reliability=MTBF，A=Availability=稼働率，S=Serviceability=MTTR。"
    - number: 11
      topic: "データマート"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "イ"
      explanation: "データマートは，データウェアハウスなどから特定の分析目的に合わせて切り出し，加工したデータ集合です。データレイクやデータカタログとは目的が異なります。"
      point: "特定部門・特定目的の分析用に整えたものがデータマート。"
    - number: 12
      topic: "DXの段階"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "ウ"
      explanation: "サプライチェーン全体を対象に，顧客・部品メーカーを含む情報を使って価値創出や全体最適につなげているため，デジタルトランスフォーメーションの段階です。"
      point: "DXは単なるデータ化や個別業務の効率化ではなく，事業・全体プロセスの変革。"
    - number: 13
      topic: "クラウドサービスの可用性評価"
      options: ["ア", "イ", "ウ", "エ", "オ", "カ", "キ", "ク", "ケ"]
      answer: "ク"
      explanation: "ヘルプデスクの電子メールは顧客対応に直ちに影響するため重要度2，人事・労務管理は主に自社内に直ちに影響するため重要度1と考えます。"
      point: "顧客に直ちに影響するか，自社だけに直ちに影響するかで切り分ける。"
    - number: 14
      topic: "クラウドストレージと情報漏えい確認"
      options: ["ア", "イ", "ウ", "エ", "オ", "カ", "キ", "ク"]
      answer: "ウ"
      explanation: "誤送信に気付いたらアクセス権を取り消し，ログでダウンロードされていないことを確認できれば，情報漏えいしていないと判断しやすくなります。"
      point: "クラウド共有では「アクセス権の取消し」と「ダウンロードログ」が判断材料になる。"
    - number: 15
      topic: "匿名加工情報"
      options: ["ア", "イ", "ウ", "エ", "オ", "カ", "キ", "ク", "ケ", "コ"]
      answer: "キ"
      explanation: "電子メールアドレスは個人を識別し得るため削除し，勤務先の業種は分析目的に必要なので残します。体重は外れ値による識別を避けつつ分析に使えるよう，トップコーディングや丸めを適用します。"
      point: "識別につながる項目は削除し，分析に必要な属性は一般化・丸めなどで残す。"

- key: "2024r06"
  label: "令和6年度"
  short_label: "2024年度"
  title: "令和6年度 情報セキュリティマネジメント試験 公開問題"
  permalink: "/sg/past/2024r06/"
  official_page: "https://www.ipa.go.jp/shiken/mondai-kaiotu/sg_fe/koukai/2024r06.html"
  question_pdf: "https://www.ipa.go.jp/shiken/mondai-kaiotu/sg_fe/koukai/eid2eo0000007g1d-att/2024r06_sg_qs.pdf"
  answer_pdf: "https://www.ipa.go.jp/shiken/mondai-kaiotu/sg_fe/koukai/eid2eo0000007g1d-att/2024r06_sg_ans.pdf"
  source_note: "令和6年度 情報セキュリティマネジメント試験 科目A・B 公開問題"
  questions:
    - number: 1
      topic: "リスクアセスメント"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "イ"
      explanation: "JIS Q 31000のリスクアセスメントは，リスク特定，リスク分析，リスク評価で構成されます。リスク対応やリスク受容は，アセスメント後の判断・処置に関わる要素です。"
      point: "リスクアセスメントは「特定・分析・評価」。"
    - number: 2
      topic: "情報のラベル付け"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "エ"
      explanation: "社外秘などの管理レベルを明示して周知するには，情報へのラベル付けが有効です。知らなかったという言い逃れを防ぎ，取扱基準と結び付けられます。"
      point: "情報の取扱いを徹底するには，分類とラベルで見える化する。"
    - number: 3
      topic: "マルウェア検出方法"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "エ"
      explanation: "ビヘイビア法は，プログラムを実行したときの振る舞いから不審な動作を検出します。パターンマッチングやチェックサムは，実行前の静的な検査でも使えます。"
      point: "振る舞いを見るのがビヘイビア法。"
    - number: 4
      topic: "サイバーキルチェーン"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "ウ"
      explanation: "サイバーキルチェーンは，攻撃者の行動を偵察から目的達成までの段階に分けて捉える考え方です。サプライチェーンリスクや中間者攻撃とは別です。"
      point: "攻撃の流れを段階で見るのがサイバーキルチェーン。"
    - number: 5
      topic: "リスクベース認証"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "イ"
      explanation: "リスクベース認証は，通常と異なるIPアドレスや端末など，リスクが高いと判断される場合に追加認証を求める仕組みです。"
      point: "いつもと違うアクセスなら追加確認する。"
    - number: 6
      topic: "TLSとサーバ証明書"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "ウ"
      explanation: "クライアントは認証局の公開鍵を使って，サーバ証明書が正当な認証局によって署名されたものかを検証します。通信データを認証局の公開鍵で暗号化するわけではありません。"
      point: "認証局の公開鍵は，サーバ証明書の検証に使う。"
    - number: 7
      topic: "個人情報保護法"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "ウ"
      explanation: "個人情報保護法の個人情報は，生存する個人に関する情報が対象です。企業の顧客情報や秘密のプライバシー情報だけに限定されません。"
      point: "個人情報は「生存する個人に関する情報」。"
    - number: 8
      topic: "内部統制の統制活動"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "ウ"
      explanation: "統制活動は，業務プロセスに組み込まれた承認，照合，検証などの具体的な手続です。リスク分析や内部監査は別の要素として扱われます。"
      point: "統制活動は，日々の業務に組み込まれた具体的なチェック。"
    - number: 9
      topic: "可用性とMTBF/MTTR"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "ウ"
      explanation: "可用性は `MTBF ÷ (MTBF + MTTR)` で考えます。MTBFを長くし，MTTRを変えなければ，故障しにくくなる分だけ可用性は向上します。"
      point: "可用性を上げるには，MTBFを伸ばすかMTTRを短くする。"
    - number: 10
      topic: "プロキシサーバ"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "エ"
      explanation: "社内からインターネットへのWebアクセスを中継し，キャッシュやフィルタリングにも使える仕組みはプロキシサーバです。"
      point: "Webアクセスの代理・中継・キャッシュはプロキシ。"
    - number: 11
      topic: "RPA導入"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "ア"
      explanation: "全社的にRPAを導入する場合は，対象業務の可視化と業務プロセスの見直しを行ってから導入するのが適切です。例外や変更が多い業務を優先すると運用が不安定になります。"
      point: "RPAは，定型的で見直された業務に適用する。"
    - number: 12
      topic: "特性要因図"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "ア"
      explanation: "特性要因図は，結果と原因の関係を魚の骨のように整理する図です。管理図，ヒストグラム，パレート図とは用途が異なります。"
      point: "原因と結果を魚の骨で整理するのが特性要因図。"
    - number: 13
      topic: "SaaSの認証強化"
      options: ["ア", "イ", "ウ", "エ", "オ", "カ"]
      answer: "ア"
      explanation: "社外から利用できるようにするにはIPアドレス制限を無効にし，認証を強化するにはワンタイムパスワードを有効にするのが最も適切です。"
      point: "利用場所を広げる制限緩和と，認証強化をセットで考える。"
    - number: 14
      topic: "バックアップ媒体の冗長化"
      options: ["ア", "イ", "ウ", "エ", "オ"]
      answer: "エ"
      explanation: "論理破損に備えるにはバックアップが必要で，テープの物理破損にも備えるには別媒体にも保存する対策が有効です。RAIDやレプリケーションだけでは論理破損の復旧に弱い場合があります。"
      point: "論理破損と媒体破損の両方に備えるには，復旧可能なバックアップを複数確保する。"
    - number: 15
      topic: "偽警告への対応"
      options: ["ア", "イ", "ウ", "エ", "オ"]
      answer: "イ"
      explanation: "偽の警告画面では，表示された指示や電話番号に従わず，ブラウザを終了して組織の手順に沿って報告することが重要です。ツールのインストールや電話連絡は被害拡大につながります。"
      point: "偽警告は，画面の指示に従わず閉じて報告する。"

- key: "2023r05"
  label: "令和5年度"
  short_label: "2023年度"
  title: "令和5年度 情報セキュリティマネジメント試験 公開問題"
  permalink: "/sg/past/2023r05/"
  official_page: "https://www.ipa.go.jp/shiken/mondai-kaiotu/sg_fe/koukai/2023r05.html"
  question_pdf: "https://www.ipa.go.jp/shiken/mondai-kaiotu/sg_fe/koukai/t6hhco0000003zx0-att/2023r05_sg_qs.pdf"
  answer_pdf: "https://www.ipa.go.jp/shiken/mondai-kaiotu/sg_fe/koukai/t6hhco0000003zx0-att/2023r05_sg_ans.pdf"
  source_note: "令和5年度 情報セキュリティマネジメント試験 科目A・B 公開問題"
  questions:
    - number: 1
      topic: "情報セキュリティ管理基準"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "イ"
      explanation: "情報セキュリティ管理基準は，JIS Q 27001及びJIS Q 27002との整合性を考慮しています。三つの基準名やトップマネジメントの選択実施という説明は不適切です。"
      point: "管理基準はISMS関連規格との関係で押さえる。"
    - number: 2
      topic: "アンチパスバック"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "イ"
      explanation: "入室記録のないIDカードで退室させない，退室記録のないIDカードで再入室させない仕組みはアンチパスバックです。"
      point: "入退室の順序矛盾を防ぐのがアンチパスバック。"
    - number: 3
      topic: "デジタルフォレンジックス"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "ウ"
      explanation: "デジタルフォレンジックスは，インシデント発生時に証拠となるデータを収集・保全・調査分析する活動です。脅威情報共有や暗号化とは目的が異なります。"
      point: "フォレンジックスは，証拠保全と調査分析。"
    - number: 4
      topic: "共通鍵暗号方式"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "エ"
      explanation: "大量データを高速に暗号化する用途では，一般に公開鍵暗号方式より共通鍵暗号方式が適しています。公開鍵暗号は鍵配送や署名などでよく使われます。"
      point: "大量データは共通鍵，鍵配送や署名は公開鍵を使い分ける。"
    - number: 5
      topic: "ハッシュ値"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "エ"
      explanation: "同じSHA-256ハッシュ値になった場合，通常はファイル内容が同じであると考えます。厳密には衝突の可能性はありますが，試験ではハッシュ値の性質から判断します。"
      point: "同じ入力なら同じハッシュ値，SHA-256の出力長は256ビット。"
    - number: 6
      topic: "SPF"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "ア"
      explanation: "SPFは，送信側ドメインが正規の送信メールサーバのIPアドレスをDNSに登録し，受信側がそれを参照して判定する仕組みです。"
      point: "SPFは送信元IPアドレスをDNSで確認する。"
    - number: 7
      topic: "SQLインジェクション対策"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "イ"
      explanation: "SQLインジェクション対策では，SQLを組み立てる際にプレースホルダやバインド機構を使うことが有効です。セッションIDやファイル参照制限は別の脅威への対策です。"
      point: "SQLインジェクションは，SQL文に入力値を直接連結しない。"
    - number: 8
      topic: "電子署名法"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "イ"
      explanation: "電子署名法では，一定の要件を満たす電子署名に，押印と同様の推定効が認められます。政府運営の認証局や共通鍵暗号だけに限定されません。"
      point: "電子署名は，文書の真正性を支える法的効果で押さえる。"
    - number: 9
      topic: "インシデント管理監査"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "ウ"
      explanation: "インシデントの種類・発生箇所・影響度合いにかかわらず連絡ルートが共通だと，重大度に応じた適切な対応が遅れるおそれがあります。"
      point: "インシデント対応は，影響度や種類に応じて連絡・報告を切り替える。"
    - number: 10
      topic: "HTTP cookie"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "ア"
      explanation: "cookieはHTTPヘッダの一部としてブラウザとWebサーバの間で送受信されます。サーバだけに保存されるものではなく，常に暗号化されるわけでもありません。"
      point: "cookieはブラウザ側に保存され，HTTPヘッダで送られる。"
    - number: 11
      topic: "BPM"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "イ"
      explanation: "BPMは，業務プロセスを分析・設計・実行・改善するマネジメントサイクルで継続的に改善する考え方です。ERP，CRM，SCMと混同しないようにします。"
      point: "BPMは業務プロセスを継続的に改善する。"
    - number: 12
      topic: "特性要因図"
      options: ["ア", "イ", "ウ", "エ"]
      answer: "イ"
      explanation: "結果と原因の関連を魚の骨のように整理する図は特性要因図です。品質管理の基本的な図法としてよく問われます。"
      point: "魚の骨は特性要因図。"
    - number: 13
