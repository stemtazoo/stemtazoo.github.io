name: Backfill missing article update dates

on:
  push:
    branches: [main]
    paths:
      - scripts/backfill_last_modified_at.py
      - .github/workflows/backfill-last-modified-at.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add missing last_modified_at values
        run: python scripts/backfill_last_modified_at.py

      - name: Commit updated pages
        run: |
          if git diff --quiet -- pages; then
            echo "No missing update dates found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages
          git commit -m "Backfill missing article update dates"
          git push
